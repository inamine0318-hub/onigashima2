// Stage7: イザナミ (虚無のキメラ最終ボス)
function drawBossIzanami(bx,by,t){
  const ph2=boss.phase===2;
  const ac=ph2?'#ff00ff':'#8800cc';
  const bd='#0a0014';
  const flk=Math.floor(t/80)%2;
  function _f(col,x,y,w,h){ctx.fillStyle=col;ctx.fillRect(bx+x,by+y,w,h);}
  ctx.globalAlpha=Math.sin(t/180)*.22+.14;_f(ac,-18,-14,boss.w+36,boss.h+20);ctx.globalAlpha=1;
  // 下半身(霧化・フェードアウト)
  for(let k=0;k<6;k++){ctx.globalAlpha=0.65-k*.09;_f('#220033',4+k*2,64+k*5,boss.w-8-k*4,10);ctx.globalAlpha=1;}
  // 多腕(左側3本)
  _f(bd,-6,10,16,26);_f('#220033',-4,12,12,22);_f(ac,-6,10,4,10);
  _f(bd,-10,28,20,20);_f('#220033',-8,30,16,16);
  _f(bd,-14,46,24,14);_f('#220033',-12,48,20,10);
  for(let k=0;k<3;k++)_f(ac,-14+k*4,58,4,8);
  // 多腕(右側3本)
  _f(bd,boss.w-10,10,16,26);_f('#220033',boss.w-8,12,12,22);_f(ac,boss.w+2,10,4,10);
  _f(bd,boss.w-10,28,20,20);_f('#220033',boss.w-8,30,16,16);
  _f(bd,boss.w-10,46,24,14);_f('#220033',boss.w-8,48,20,10);
  for(let k=0;k<3;k++)_f(ac,boss.w-10+k*4,58,4,8);
  // 胴体(巨大)
  _f(bd,4,14,boss.w-8,54);_f('#220033',6,16,boss.w-12,50);_f('#0a001a',10,16,boss.w-20,36);
  _f(ac,10,16,boss.w-20,4);_f('#440055',16,22,boss.w-32,24);_f(ac,20,28,boss.w-40,12);
  for(let k=0;k<4;k++)_f(ac,10,38+k*6,boss.w-20,2);
  // 首
  _f(bd,18,4,boss.w-36,12);_f(ac,20,4,boss.w-40,4);
  // 頭(威圧的な大型)
  _f(bd,2,-22,boss.w-4,28);_f('#220033',4,-20,boss.w-8,26);_f(ac,2,-22,boss.w-4,6);
  // 角(4本)
  _f(ac,6,-38,6,18);_f('#880099',8,-42,4,12);_f('#ff88ff',9,-46,3,8);
  _f(ac,18,-32,5,12);_f('#880099',19,-35,4,8);
  _f(ac,boss.w-22,-32,5,12);_f('#880099',boss.w-22,-35,4,8);
  _f(ac,boss.w-12,-38,6,18);_f('#880099',boss.w-14,-42,4,12);_f('#ff88ff',boss.w-13,-46,3,8);
  // 目(4つ ─ キメラの証)
  _f('#050010',6,-12,14,10);_f(flk?ac:'#6600aa',7,-11,12,8);_f('#ffffff',8,-10,4,3);
  _f('#050010',22,-16,10,8);_f(flk?'#ff44ff':'#440088',23,-15,8,6);
  _f('#050010',boss.w-32,-16,10,8);_f(flk?'#ff44ff':'#440088',boss.w-31,-15,8,6);
  _f('#050010',boss.w-20,-12,14,10);_f(flk?ac:'#6600aa',boss.w-19,-11,12,8);_f('#ffffff',boss.w-18,-10,4,3);
  // 口(裂けた)
  _f('#0a0018',10,-4,boss.w-20,10);_f('#330044',12,-2,boss.w-24,8);
  for(let k=0;k<5;k++)_f(ac,12+k*10,-4+k%2*2,8,5);
  if(boss.state==='charge'){ctx.globalAlpha=0.32+Math.random()*.14;_f('#ff00ff',-10,0,boss.w+20,boss.h);ctx.globalAlpha=1;}
  if(ph2){ctx.globalAlpha=0.18+Math.sin(t/75)*.09;_f('#ff88ff',-8,-4,boss.w+16,boss.h+8);ctx.globalAlpha=1;}

function getStageRank(){
  const t=clearTime,hp=clearHp,sc=score;
  if(t<7200&&hp>=4&&sc>=2000)return'S';
  if(t<14400&&hp>=2&&sc>=1200)return'A';
  if(t<22000&&hp>=1)return'B';
  return'C';
}

  dr(0,0,W,H,'#020210');

  ctx.textAlign='center';

  dr(W/2-60,H*.08,120,22,'#0a1430');
  ctx.fillStyle='#5566aa';ctx.font=`bold ${Math.min(W*.025,14)}px monospace`;
  ctx.fillText(`STAGE ${currentStage} / ${TOTAL_STAGES}  ${scfg.name}`,W/2,H*.08+15);
  // タイトル
  ctx.fillStyle='#040418';ctx.font=`bold ${Math.min(W*.052,42)}px monospace`;ctx.fillText('ステージクリア',W/2+2,H*.22+2);
  ctx.fillStyle=isLast?'#ff88ff':'#ffee44';ctx.fillText('ステージクリア',W/2,H*.22);
  // 次ステージ予告 or ALL CLEAR
  if(isLast){
    ctx.fillStyle='#ff44ff';ctx.font=`bold ${Math.min(W*.032,20)}px monospace`;
    ctx.fillText('★ 全ステージクリア! ★',W/2,H*.22+34);
  } else {
    const next=STAGE_CFG[currentStage];
    ctx.fillStyle='#7788cc';ctx.font=`${Math.min(W*.028,16)}px monospace`;
    ctx.fillText(`NEXT: STAGE ${currentStage+1} - ${next.name} [${next.bossName}]`,W/2,H*.22+34);
  }
  const rows=[
    ['STAGE', currentStage+'/'+TOTAL_STAGES,'#ffaa44'],
    ['SCORE',String(score).padStart(7,'0'),'#ffdd00'],
    ['TIME',Math.floor(clearTime/3600)+"'"+String(Math.floor(clearTime%3600/60)).padStart(2,'0')+'"','#aaffaa'],
    ['ORBS',orbsCollected.length+'/'+TOTAL_STAGES,'#88ddff'],
    ['CHARACTER',CHARS[selChar].nick,'#ffbbdd'],
    ['RANK',rank,rankCol],
  ];
  rows.forEach((r,i)=>{
    const isRank=r[0]==='RANK';
    dr(W/2-118,H*.33+i*24-10,236,isRank?28:22,'#0a0a22');
    ctx.fillStyle='#556688';ctx.font=`${Math.min(W*.030,15)}px monospace`;
    ctx.textAlign='left';ctx.fillText(r[0],W/2-108,H*.33+i*24+5);
    if(isRank){
      const fs=Math.min(W*.08,38);
      ctx.fillStyle=r[2];ctx.font=`bold ${fs}px monospace`;ctx.textAlign='right';
      ctx.fillText(r[1],W/2+108,H*.33+i*24+fs*.55);
      const desc={S:'PERFECT',A:'GREAT',B:'GOOD',C:'TRY AGAIN'}[r[1]]||'';
      ctx.fillStyle=r[2];ctx.font=`${Math.min(W*.025,13)}px monospace`;
      ctx.fillText(desc,W/2-10,H*.33+i*24+14);
    } else {
      ctx.fillStyle=r[2];ctx.font=`bold ${Math.min(W*.025,15)}px monospace`;
      ctx.textAlign='right';ctx.fillText(r[1],W/2+108,H*.33+i*24+5);
    }
  });
  const scores=getScores();
  if(scores.length){
    ctx.fillStyle='#334455';ctx.font=`bold ${Math.min(W*.030,15)}px monospace`;ctx.textAlign='center';
    ctx.fillText('── ベストスコア ──',W/2,H*.65);
    scores.forEach((s,i)=>{
      ctx.fillStyle=i===0?'#ffcc00':'#7788aa';
      ctx.font=`${Math.min(W*.020,13)}px monospace`;ctx.textAlign='center';
      ctx.fillText(`${i+1}. ${s.char}  ${String(s.score).padStart(7,'0')}  ${s.date}`,W/2,H*.70+i*17);
    });
  }
  if(Math.floor(frameTime/500)%2){
    ctx.fillStyle=isLast?'#ff88ff':'#aabbff';
    ctx.font=`bold ${Math.min(W*.030,18)}px monospace`;ctx.textAlign='center';
    ctx.fillText(isLast?'>> スタート TO TITLE <<':'>> スタート - NEXT STAGE >>',W/2,H*.96);
  }
}

// ================================================================
//  ステージ別背景フレア (drawBg冒頭から呼ぶ・既存コード不変)
// ================================================================
function drawStageBgFlair(st,t){
  // 鬼ヶ島全5ステージ：時間帯別空グラデーション + ステージ固有フレア
  const skies=[
    {top:'#0d0d0d',bot:'#1a0a0a'},     // Stage1: 昼間の青空→暗い赤
    {top:'#c84400',bot:'#1a0800'},     // Stage2: 夕焼け→暗い
    {top:'#1a0200',bot:'#0a0000'},     // Stage3: 赤黒い夜
    {top:'#0a0010',bot:'#050008'},     // Stage4: 深夜・紫闇
    {top:'#050205',bot:'#020203'}      // Stage5: 完全闇
  ];
  const sky=skies[Math.min(st-1,4)];
  const grd=ctx.createLinearGradient(0,0,0,H*.7);
  grd.addColorStop(0,sky.top);grd.addColorStop(1,sky.bot);
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H*.7);

  // ステージ固有フレア処理
  if(st===1){
    // 朝日：画面左上に太陽
    const sunX=W*.15, sunY=H*.15;
    // 太陽の光輪（大）
    ctx.globalAlpha=0.2;ctx.fillStyle='#ffaa00';
    ctx.beginPath();ctx.arc(sunX,sunY,60,0,Math.PI*2);ctx.fill();
    // 太陽の光輪（中）
    ctx.globalAlpha=0.4;ctx.fillStyle='#ffcc00';
    ctx.beginPath();ctx.arc(sunX,sunY,45,0,Math.PI*2);ctx.fill();
    // 太陽の本体
    ctx.globalAlpha=0.8;ctx.fillStyle='#ffdd00';
    ctx.beginPath();ctx.arc(sunX,sunY,30,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // 白い雲（視差付き）
    ctx.globalAlpha=0.35;ctx.fillStyle='#ffffff';
    for(let k=0;k<5;k++){
      const cx=((k*150+cam.x*.08)%W);
      const cy=H*.08+k*20;
      dr(cx,cy,120,30,'#ffffff');
      dr(cx+40,cy+8,90,22,'#f0f0ff');
    }
    ctx.globalAlpha=1;
    // 砦跡から立ち昇る煙
    for(let k=0;k<2;k++){
      const sy=H*.3-(t/1200+k*4000)%H*.4;
      ctx.globalAlpha=0.08+k*0.04;
      ctx.fillStyle='#3a2a2a';
      ctx.fillRect(W*(0.1+k*0.7),sy,W*.08,12);
    }
    ctx.globalAlpha=1;
  }
  if(st===2){
    // 夕方：地平線に沈む太陽
    const sunX=W*.75, sunY=H*.48; // 地平線に近い位置
    // 太陽の光輪（大）
    ctx.globalAlpha=0.25;ctx.fillStyle='#ff9900';
    ctx.beginPath();ctx.arc(sunX,sunY,80,0,Math.PI*2);ctx.fill();
    // 太陽の光輪（中）
    ctx.globalAlpha=0.4;ctx.fillStyle='#ffaa00';
    ctx.beginPath();ctx.arc(sunX,sunY,60,0,Math.PI*2);ctx.fill();
    // 太陽の本体
    ctx.globalAlpha=0.9;ctx.fillStyle='#ff7700';
    ctx.beginPath();ctx.arc(sunX,sunY,40,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // 海面への太陽反射（光のライン）
    ctx.globalAlpha=0.3;ctx.fillStyle='#ffcc66';
    ctx.fillRect(W*.6,H*.48,W*.3,H*.08);
    ctx.globalAlpha=1;
  }
  if(st===3){
    // 夜：月を追加
    const moonX=W*.8, moonY=H*.15;
    // 月の光輪
    ctx.globalAlpha=0.12;ctx.fillStyle='#ccbbaa';
    ctx.beginPath();ctx.arc(moonX,moonY,50,0,Math.PI*2);ctx.fill();
    // 月の本体
    ctx.globalAlpha=0.6;ctx.fillStyle='#eeddcc';
    ctx.beginPath();ctx.arc(moonX,moonY,35,0,Math.PI*2);ctx.fill();
    // 月のクレーター（暗い部分）
    ctx.globalAlpha=0.3;ctx.fillStyle='#221100';
    ctx.beginPath();ctx.arc(moonX-10,moonY-8,6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(moonX+8,moonY+5,5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // 釜地帯の赤いグロー
    const fl=Math.sin(t/280)*.25+.75;
    ctx.globalAlpha=fl*.28;dr(0,H*.52,W,H*.48,'#bb1a00');
    ctx.globalAlpha=fl*.18;dr(0,H*.68,W,H*.32,'#ff5500');
    ctx.globalAlpha=1;
  }
  if(st===4){
    // 深夜の星（まばたくアニメーション）
    const stars=[
      {x:W*.1,y:H*.1},{x:W*.25,y:H*.05},{x:W*.4,y:H*.12},
      {x:W*.7,y:H*.08},{x:W*.85,y:H*.15},{x:W*.15,y:H*.25},
      {x:W*.6,y:H*.2},{x:W*.9,y:H*.22}
    ];
    for(let k=0;k<stars.length;k++){
      const s=stars[k];
      const blink=Math.sin(t/500+k*1.5)*.5+.5; // 星がまばたく
      ctx.globalAlpha=blink*.6;ctx.fillStyle='#ffeecc';
      ctx.fillRect(s.x,s.y,2,2);
    }
    ctx.globalAlpha=1;
    // 深夜：呪いの光グロー
    ctx.globalAlpha=0.08;dr(0,0,W,H,'#440044');ctx.globalAlpha=1;
  }
  if(st===5){
    // 完全闇：微かな呪いの光点
    for(let k=0;k<6;k++){
      const bx=((k*101+t*.003)%W);
      const by=H*.1+(k*71+t*.002)%(H*.8);
      ctx.globalAlpha=Math.sin(t/800+k)*.3+.15;
      dr(bx,by,2,2,'#cc3333');ctx.globalAlpha=1;
    }
  }
}

// ================================================================
//  月面古代遺跡 背景 - 高品質グラフィックス版
// ================================================================
function drawBg(){
  const scfg=STAGE_CFG[currentStage-1];
  dr(0,0,W,H,scfg?scfg.bgMain:'#01010a');

  const t=frameTime;
  const st=currentStage;
  drawStageBgFlair(st,t);

  if(st<=5){
  // 鬼ヶ島全ステージ背景（ステージごとに異なる世界観）

  if(st===1){
    // Stage 1：海岸・鬼ヶ島の入口（豊かな海景観・高品質）
    // 空グラデーション（複層化）
    const skyGrd=ctx.createLinearGradient(0,0,0,H*.4);
    skyGrd.addColorStop(0,'#5a9fd4');
    skyGrd.addColorStop(0.3,'#87ceeb');
    skyGrd.addColorStop(0.7,'#c5e0f5');
    skyGrd.addColorStop(1,'#e0f6ff');
    ctx.fillStyle=skyGrd;ctx.fillRect(0,0,W,H*.4);

    // 海岸（テクスチャ）
    const beachGrd=ctx.createLinearGradient(0,H*.4,0,H*.6);
    beachGrd.addColorStop(0,'#e8c7a8');
    beachGrd.addColorStop(1,'#c49a7a');
    ctx.fillStyle=beachGrd;ctx.fillRect(0,H*.4,W,H*.2);
    // 砂のテクスチャ
    ctx.globalAlpha=0.15;ctx.fillStyle='#8b6f47';
    for(let i=0;i<W;i+=20)ctx.fillRect(i,H*.45,18,2);ctx.globalAlpha=1;

    // 水平線
    ctx.fillStyle='#3a7aa0';ctx.fillRect(0,H*.45,W,2);
    ctx.globalAlpha=0.6;ctx.fillStyle='#ffffff';ctx.fillRect(0,H*.46,W,1);ctx.globalAlpha=1;

    // 海（複層グラデーション）
    const seaGrd=ctx.createLinearGradient(0,H*.45,0,H);
    seaGrd.addColorStop(0,'#2a8ab0');
    seaGrd.addColorStop(0.3,'#1a7aa0');
    seaGrd.addColorStop(0.6,'#0d5a80');
    seaGrd.addColorStop(1,'#061e3a');
    ctx.fillStyle=seaGrd;ctx.fillRect(0,H*.45,W,H*.55);

    // 波パターン（複層・グラデーション効果）
    // 波層1：浅い波
    ctx.globalAlpha=0.35;ctx.fillStyle='#c5e8ff';
    for(let i=0;i<W;i+=25){
      const waveY=H*.48+Math.sin(i*0.04+t*.003)*2;
      ctx.fillRect(i,waveY,15,2);
    }
    // 波層2：深い波
    ctx.globalAlpha=0.25;ctx.fillStyle='#7fa8d1';
    for(let i=0;i<W;i+=25){
      const waveY2=H*.55+Math.sin(i*0.05+t*.004+2)*3;
      ctx.fillRect(i,waveY2,20,2);
    }
    // 波層3：白いハイライト
    ctx.globalAlpha=0.18;ctx.fillStyle='#ffffff';
    for(let i=0;i<W;i+=40){
      const waveY3=H*.5+Math.sin(i*0.03+t*.005)*1.5;
      ctx.fillRect(i,waveY3,12,1);
    }
    ctx.globalAlpha=1;

    // 岩礁（立体感・グラデーション）
    const rocks=[
      {x:W*.15,y:H*.52,r:12},{x:W*.25,y:H*.56,r:8},{x:W*.75,y:H*.54,r:10},{x:W*.85,y:H*.58,r:7}
    ];
    rocks.forEach(rock=>{
      const rg=ctx.createRadialGradient(rock.x-rock.r*.3,rock.y-rock.r*.3,1,rock.x,rock.y,rock.r);
      rg.addColorStop(0,'#777777');rg.addColorStop(0.6,'#555555');rg.addColorStop(1,'#333333');
      ctx.fillStyle=rg;ctx.beginPath();ctx.arc(rock.x,rock.y,rock.r,0,Math.PI*2);ctx.fill();
      // シャドウ
      ctx.globalAlpha=0.3;ctx.fillStyle='#000000';
      ctx.beginPath();ctx.arc(rock.x+rock.r*.3,rock.y+rock.r*.3,rock.r*.4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    });

    // 遠くの島（水平線の向こう・グラデーション）
    ctx.globalAlpha=0.4;
    const islandGrd1=ctx.createLinearGradient(W*.2,H*.35,W*.2,H*.48);
    islandGrd1.addColorStop(0,'#3a5a6a');islandGrd1.addColorStop(1,'#5a7a8a');
    ctx.fillStyle=islandGrd1;
    ctx.beginPath();ctx.moveTo(W*.2,H*.48);ctx.lineTo(W*.3,H*.35);ctx.lineTo(W*.4,H*.48);ctx.fill();
    const islandGrd2=ctx.createLinearGradient(W*.6,H*.32,W*.6,H*.48);
    islandGrd2.addColorStop(0,'#3a5a6a');islandGrd2.addColorStop(1,'#5a7a8a');
    ctx.fillStyle=islandGrd2;
    ctx.beginPath();ctx.moveTo(W*.6,H*.48);ctx.lineTo(W*.75,H*.32);ctx.lineTo(W*.9,H*.48);ctx.fill();
    ctx.globalAlpha=1;

    // 壊れた鳥居（古木風・グラデーション）
    ctx.globalAlpha=0.55;
    const torii1Grd=ctx.createLinearGradient(W*.35,H*.32,W*.35,H*.5);
    torii1Grd.addColorStop(0,'#9B5514');torii1Grd.addColorStop(1,'#6B3310');
    ctx.fillStyle=torii1Grd;ctx.fillRect(W*.35,H*.32,4,H*.18);
    const torii2Grd=ctx.createLinearGradient(W*.46,H*.32,W*.46,H*.5);
    torii2Grd.addColorStop(0,'#9B5514');torii2Grd.addColorStop(1,'#6B3310');
    ctx.fillStyle=torii2Grd;ctx.fillRect(W*.46,H*.32,4,H*.18);
    ctx.fillRect(W*.33,H*.32,16,4);
    ctx.globalAlpha=1;
  }else if(st===2){
    // Stage 2：山道・崩れた崖（岩山が険しい・高品質）
    const bgGrd=ctx.createLinearGradient(0,0,0,H);
    bgGrd.addColorStop(0,'#6a9dd8');bgGrd.addColorStop(0.35,'#87ceeb');
    bgGrd.addColorStop(0.5,'#d4a574');bgGrd.addColorStop(0.75,'#a68860');bgGrd.addColorStop(1,'#6b5645');
    ctx.fillStyle=bgGrd;ctx.fillRect(0,0,W,H);
    // 空のテクスチャ
    ctx.globalAlpha=0.08;ctx.fillStyle='#ffffff';
    for(let i=0;i<8;i++)ctx.fillRect(Math.random()*W,Math.random()*H*.4,Math.random()*60+20,1);ctx.globalAlpha=1;

    // 崖（ガタガタ・グラデーション・立体感）
    ctx.globalAlpha=0.6;
    const cliffGrd=ctx.createLinearGradient(0,H*.35,0,H);
    cliffGrd.addColorStop(0,'#7a7a7a');cliffGrd.addColorStop(0.5,'#696969');cliffGrd.addColorStop(1,'#4a4a4a');
    ctx.fillStyle=cliffGrd;
    ctx.beginPath();ctx.moveTo(W*.1,H*.35);
    for(let i=0;i<=10;i++)ctx.lineTo(W*(0.1+i*0.09),H*(0.35+(i%2)*0.05));
    ctx.lineTo(W,H*.5);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.fill();
    // 崖の線（陰影効果）
    ctx.globalAlpha=0.25;ctx.strokeStyle='#000000';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(W*.1,H*.35);
    for(let i=0;i<=10;i++)ctx.lineTo(W*(0.1+i*0.09),H*(0.35+(i%2)*0.05));
    ctx.stroke();ctx.globalAlpha=1;

    // 落石（立体感・グラデーション）
    ctx.globalAlpha=0.5;
    for(let i=0;i<3;i++){
      const rockX=W*(0.2+i*0.3),rockY=H*(0.25+Math.sin(t*.002+i)*0.1);
      const rg=ctx.createRadialGradient(rockX-2,rockY-2,1,rockX,rockY,5);
      rg.addColorStop(0,'#d0d0d0');rg.addColorStop(1,'#808080');
      ctx.fillStyle=rg;ctx.beginPath();ctx.arc(rockX,rockY,5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.2;ctx.fillStyle='#000000';
      ctx.beginPath();ctx.arc(rockX+2,rockY+2,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=0.5;
    }
    ctx.globalAlpha=1;
  }else if(st===3){
    // Stage 3：洞窟・暗い（妖怪の気配・高品質）
    const bgGrd=ctx.createLinearGradient(0,0,0,H);
    bgGrd.addColorStop(0,'#1a1a2a');bgGrd.addColorStop(0.4,'#2a2a3a');bgGrd.addColorStop(1,'#0f0f1a');
    ctx.fillStyle=bgGrd;ctx.fillRect(0,0,W,H);

    // 洞窟の天井（鍾乳石・グラデーション）
    for(let i=0;i<5;i++){
      const sx=W*(i*0.2+0.05),sh=H*.15+Math.sin(t*.003+i)*H*.05;
      const stalGrd=ctx.createLinearGradient(sx,0,sx,sh);
      stalGrd.addColorStop(0,'#2a2a3a');stalGrd.addColorStop(1,'#0a0a1a');
      ctx.globalAlpha=0.35;ctx.fillStyle=stalGrd;ctx.fillRect(sx,0,W*.08,sh);
      // 先端のハイライト
      ctx.globalAlpha=0.15;ctx.fillStyle='#4a4a6a';ctx.fillRect(sx+1,sh-2,W*.06,2);
    }
    ctx.globalAlpha=1;

    // 奥行きの暗さ（段階的グラデーション）
    ctx.globalAlpha=0.12;ctx.fillStyle='#000000';
    ctx.fillRect(0,H*.3,W,H*.7);
    ctx.globalAlpha=0.08;
    ctx.fillRect(0,H*.5,W,H*.5);
    ctx.globalAlpha=1;
  }else if(st===4){
    // Stage 4：火山・溶岩（赤い空・高品質）
    const bgGrd=ctx.createLinearGradient(0,0,0,H);
    bgGrd.addColorStop(0,'#cc3311');bgGrd.addColorStop(0.25,'#ff6644');
    bgGrd.addColorStop(0.5,'#ff8844');bgGrd.addColorStop(0.75,'#bb5522');bgGrd.addColorStop(1,'#5a2010');
    ctx.fillStyle=bgGrd;ctx.fillRect(0,0,W,H);

    // 溶岩の炎（複層・ダイナミック）
    const fl=Math.sin(t/300)*.3+.6;
    // 下層：深い赤
    ctx.globalAlpha=fl*.2;ctx.fillStyle='#8b3a0e';
    ctx.fillRect(0,H*.7,W,H*.3);
    // 中層：オレンジ
    ctx.globalAlpha=fl*.15;ctx.fillStyle='#ff4400';
    ctx.fillRect(0,H*.6,W,H*.4);
    // 上層：黄色
    ctx.globalAlpha=fl*.12;ctx.fillStyle='#ffaa00';
    ctx.fillRect(W*.1,H*.55,W*.8,H*.2);
    // 炎の先端（パーティクル感）
    ctx.globalAlpha=fl*.08;ctx.fillStyle='#ffdd00';
    for(let i=0;i<6;i++){
      const cx=W*(0.2+i*0.13);
      ctx.beginPath();ctx.arc(cx,H*.5+Math.sin(t/150+i)*(H*.08),W*.06,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

    // 火山島のシルエット（グラデーション・立体感）
    const volcanoGrd=ctx.createLinearGradient(W*.5,H*.1,W*.5,H*.5);
    volcanoGrd.addColorStop(0,'#3a1a0a');volcanoGrd.addColorStop(1,'#1a0a00');
    ctx.globalAlpha=0.5;ctx.fillStyle=volcanoGrd;
    ctx.beginPath();ctx.moveTo(W*.3,H*.5);ctx.lineTo(W*.5,H*.1);ctx.lineTo(W*.7,H*.5);ctx.fill();
    // 火山の陰
    ctx.globalAlpha=0.25;ctx.fillStyle='#000000';
    ctx.beginPath();ctx.moveTo(W*.5,H*.1);ctx.lineTo(W*.7,H*.5);ctx.lineTo(W*.55,H*.5);ctx.fill();
    ctx.globalAlpha=1;
  }else if(st===5){
    // Stage 5：鬼の城周辺・砦（ラスト・高品質）
    const bgGrd=ctx.createLinearGradient(0,0,0,H);
    bgGrd.addColorStop(0,'#4a2a1a');bgGrd.addColorStop(0.3,'#6a3a2a');
    bgGrd.addColorStop(0.5,'#4a4a5a');bgGrd.addColorStop(0.8,'#3a3a4a');bgGrd.addColorStop(1,'#1a1a2a');
    ctx.fillStyle=bgGrd;ctx.fillRect(0,0,W,H);
    // 暗い雲状テクスチャ
    ctx.globalAlpha=0.12;ctx.fillStyle='#000000';
    for(let i=0;i<12;i++)ctx.fillRect(Math.random()*W,Math.random()*H,Math.random()*W*.3+30,2);ctx.globalAlpha=1;

    // 砦のシルエット（グラデーション・立体感）
    const fortGrd=ctx.createLinearGradient(W*.2,H*.2,W*.8,H*.7);
    fortGrd.addColorStop(0,'#2a0a0a');fortGrd.addColorStop(1,'#0a0a0a');
    ctx.globalAlpha=0.6;ctx.fillStyle=fortGrd;
    // 砦の壁
    ctx.fillRect(W*.2,H*.2,W*.6,H*.5);
    // 砦の塔
    const towerGrd=ctx.createLinearGradient(W*.25,H*.05,W*.25,H*.35);
    towerGrd.addColorStop(0,'#3a0a0a');towerGrd.addColorStop(1,'#0a0a0a');
    ctx.fillStyle=towerGrd;ctx.fillRect(W*.25,H*.05,W*.1,H*.3);
    const towerGrd2=ctx.createLinearGradient(W*.65,H*.05,W*.65,H*.35);
    towerGrd2.addColorStop(0,'#3a0a0a');towerGrd2.addColorStop(1,'#0a0a0a');
    ctx.fillStyle=towerGrd2;ctx.fillRect(W*.65,H*.05,W*.1,H*.3);
    // 塔の窓（エフェクト）
    ctx.globalAlpha=0.4;ctx.fillStyle='#ff4400';
    ctx.fillRect(W*.28,H*.1,W*.04,H*.04);ctx.fillRect(W*.28,H*.18,W*.04,H*.04);
    ctx.fillRect(W*.68,H*.1,W*.04,H*.04);ctx.fillRect(W*.68,H*.18,W*.04,H*.04);

    // 鬼のシルエット群（恐怖感・グラデーション）
    for(let i=0;i<5;i++){
      const sx=W*(0.15+i*0.15);
      const demonGrd=ctx.createRadialGradient(sx-3,H*.6-2,1,sx,H*.6,8);
      demonGrd.addColorStop(0,'#5a1a1a');demonGrd.addColorStop(1,'#0a0a0a');
      ctx.globalAlpha=0.35;ctx.fillStyle=demonGrd;
      ctx.beginPath();ctx.arc(sx,H*.6,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(10,0,0,0.5)';ctx.fillRect(sx-6,H*.65,12,H*.25);
    }
    ctx.globalAlpha=1;
  }

  if(st===7){
    // Stage 7：洞窟・最終地
    const bgGrd=ctx.createLinearGradient(0,0,0,H);
    bgGrd.addColorStop(0,'#050205');bgGrd.addColorStop(1,'#020203');
    ctx.fillStyle=bgGrd;ctx.fillRect(0,0,W,H);
    // 鍾乳石（固定位置）
    ctx.globalAlpha=0.18;ctx.fillStyle='#1a0a0a';
    const stalactitePosY=Math.floor(frameTime/100)%200;
    for(let k=0;k<6;k++){const sx=W*(k*0.16+0.02);const sh=H*.12+Math.sin(frameTime*.002+k)*H*.08;ctx.fillRect(sx,0,W*.08,sh);}
    // 脈動する肉壁
    const pulse=Math.sin(t/300)*.06+.12;
    ctx.globalAlpha=pulse;ctx.fillStyle='#4a0a0a';
    ctx.fillRect(0,H*.2,W*.08,H*.6);ctx.fillRect(W*.92,H*.2,W*.08,H*.6);
    // 洞窟感：暗化
    ctx.globalAlpha=0.05;ctx.fillStyle='#000000';
    ctx.fillRect(0,H*.3,W,H*.7);
    ctx.globalAlpha=0.08;ctx.fillRect(0,H*.5,W,H*.5);
    ctx.globalAlpha=0.1;ctx.fillRect(0,H*.65,W,H*.35);
    // 霧エフェクト
    const mistGrd=ctx.createLinearGradient(0,H*.5,0,H);
    mistGrd.addColorStop(0,'rgba(0,0,0,0)');
    mistGrd.addColorStop(1,'rgba(20,0,10,0.4)');
    ctx.fillStyle=mistGrd;ctx.fillRect(0,H*.5,W,H*.5);
    // 呪いの光点
    for(let k=0;k<12;k++){
      const bx=((k*87+t*.003)%W);
      const by=H*.1+(k*69+t*.002)%(H*.8);
      ctx.globalAlpha=Math.sin(t/800+k)*.4+.2;
      dr(bx,by,2,2,'#cc3333');ctx.globalAlpha=1;
    }
    ctx.globalAlpha=1;
  }

  } // end if(st<=5)

  if(st<=5){
  // 崩れた石造り柱シルエット (暗いグレー + 松明風グロー)
  PILLARS.forEach(p=>{
    const px=Math.floor(p.x-cam.x*.15);
    if(px<-40||px>W+40)return;
    const bw=22,bh=p.h,by=H-60-bh;
    // 柱本体（石造り暗グレー）
    dr(px-bw/2,by,bw,bh,'#1a1818');
    dr(px-bw/2,by,bw,Math.floor(bh*.28),'#201e1e');
    // 欠け (崩壊表現)
    if(bh>100)dr(px+bw/2-5,by+Math.floor(bh*.27),5,8,'#0a0a08');
    // 頭部笠石（石造り）
    dr(px-bw/2-3,by,bw+6,4,'#2a2020');
    dr(px-bw/2-3,by,bw+6,2,'#302828');
    // 根元影
    dr(px-bw/2-2,by+bh-5,bw+4,5,'#080806');
    // 石目 (水平ライン)
    for(let ly=by+16;ly<by+bh-10;ly+=20)dr(px-bw/2+1,ly,bw-2,1,'#131010');
    // 松明風グロー（赤橙）
    if(bh>130){
      const gl=Math.sin(t/1400+p.x*.003)*.5+.5;
      const gy=by+Math.floor(bh*.42);
      ctx.globalAlpha=0.07+gl*.12;
      dr(px-4,gy,8,2,'#cc4400');dr(px-2,gy-3,4,8,'#cc4400');
      dr(px-5,gy+8,10,1,'#ff6600');
      ctx.globalAlpha=1;
    }
  });
  } // end if(st<=5)

  // Stage 7: エネルギー導管 (石柱の代わり)
  if(st===7){
    for(let k=0;k<6;k++){
      const cx=Math.floor(((k*211+cam.x*.05)%(W+80)+W+80)%(W+80))-40;
      const ch=Math.floor(120+k*22);const cby=H-ch-20;
      const gl=Math.sin(t/800+k)*.3+.7;
      // 導管本体 (暗いテック色)
      dr(cx,cby,10,ch,'#081018');dr(cx+1,cby,8,ch,'#0c1828');dr(cx+2,cby,6,2,'#1a3050');
      // エネルギーライン (縦流れ)
      const ey=Math.floor((t/40+k*33)%ch);
      ctx.globalAlpha=gl*.5;dr(cx+4,cby+ey,2,Math.min(8,ch-ey),'#00aaff');ctx.globalAlpha=1;
      // 接続ノード
      for(let ny=cby+16;ny<cby+ch-16;ny+=30){ctx.globalAlpha=0.4+gl*.2;dr(cx-2,ny,14,4,'#003348');dr(cx,ny+1,10,2,'#0055aa');ctx.globalAlpha=1;}
    }
  }

  // ステージ固有の背景エフェクト
  if(st===2){ // 雷峰: 遠景に稲妻フラッシュ
    const lp=Math.floor(t/3200)%7;
    if(Math.floor(t/3200)*3200+800>t){
      ctx.globalAlpha=0.06+lp*.01;
      dr(W*(.2+lp*.1),0,3,H*.7,'#8899ff');
      ctx.globalAlpha=0.03;dr(W*(.2+lp*.1)-5,0,14,H*.5,'#4455cc');
      ctx.globalAlpha=1;
    }
    // 暗雲帯
    ctx.globalAlpha=0.09;dr(0,H*.05,W,H*.18,'#050510');ctx.globalAlpha=1;
  }
  if(st===3){ // 炎窟: 下部に溶岩グロー
    const fl=Math.sin(t/350)*.3+.7;
    ctx.globalAlpha=fl*.18;dr(0,H*.72,W,H*.28,'#ff4400');ctx.globalAlpha=1;
    ctx.globalAlpha=fl*.10;dr(0,H*.82,W,H*.18,'#ff8800');ctx.globalAlpha=1;
    // 揺れる炎パーティクル(背景)
    for(let k=0;k<8;k++){
      const fx=((k*137+t*.04)%W);
      const fy=H*.7+Math.sin(t/200+k)*(H*.05);
      ctx.globalAlpha=0.07;dr(fx,fy,4,12,'#ff6600');ctx.globalAlpha=1;
    }
  }
  if(st===4){ // 深海神殿: 海中コースティクス光
    for(let k=0;k<12;k++){
      const cx=((k*211+t*.015)%W);
      const cy=H*.2+Math.sin(t/400+k*0.8)*(H*.3);
      ctx.globalAlpha=0.04+Math.sin(t/300+k)*.02;
      dr(cx,cy,Math.floor(20+Math.sin(k)*10),2,'#22aaaa');ctx.globalAlpha=1;
    }
    // 深海の暗さ (下部)
    ctx.globalAlpha=0.12;dr(0,H*.5,W,H*.5,'#002a20');ctx.globalAlpha=1;
  }
  if(st===5){ // 月宮殿: 浮遊する光の玉
    for(let k=0;k<7;k++){
      const ox=((k*293+t*.008)%W);
      const oy=H*.15+Math.sin(t/600+k*1.1)*(H*.3);
      const gl=Math.sin(t/400+k)*.4+.6;
      ctx.globalAlpha=gl*.10;dr(ox-8,oy-8,16,16,'#aabbff');ctx.globalAlpha=1;
      ctx.globalAlpha=gl*.06;dr(ox-14,oy-14,28,28,'#8899ee');ctx.globalAlpha=1;
    }
  }
  if(st===6){ // 崩落回廊: 石壁・ひび割れ・崩落の砂埃
    // 石壁の質感 (縦ひび・視差)
    for(let k=0;k<9;k++){
      const cx=Math.floor(((k*127+cam.x*.04)%W+W)%W);
      ctx.globalAlpha=0.07;dr(cx,0,1,H,'#998866');
      ctx.globalAlpha=0.04;dr(cx+3,Math.floor(H*.08+k*9)%H,1,Math.floor(H*.35),'#664422');
      ctx.globalAlpha=1;
    }
    // 崩落の砂埃 (ゆっくり落下)
    for(let k=0;k<12;k++){
      const dx=((k*163+t*.006)%W);
      const dy=(H*.15+k*30+t*.03)%H;
      ctx.globalAlpha=0.04+Math.sin(t/600+k)*.02;
      dr(dx,dy,Math.floor(16+k*4),2,'#aa8855');ctx.globalAlpha=1;
    }
    // 遠景アーチ (廊下の奥)
    for(let k=0;k<3;k++){
      const ax=Math.floor(((k*200+cam.x*.06)%(W+100)+W+100)%(W+100))-50;
      ctx.globalAlpha=0.09;
      dr(ax,Math.floor(H*.18),5,Math.floor(H*.65),'#554433');
      dr(ax-14,Math.floor(H*.18),32,5,'#443322');
      ctx.globalAlpha=0.04;dr(ax-16,Math.floor(H*.18),36,Math.floor(H*.65),'#332211');
      ctx.globalAlpha=1;
    }
    // 割れ目グロー (古代エネルギー漏れ)
    for(let k=0;k<4;k++){
      const grx=((k*241+cam.x*.03)%(W+60)+W+60)%(W+60)-30;
      const gl=Math.sin(t/700+k*1.3)*.4+.5;
      ctx.globalAlpha=gl*.07;dr(grx,0,1,H,'#4400bb');ctx.globalAlpha=1;
    }
    // 天井の暗さ (屋内感)
    ctx.globalAlpha=0.18;dr(0,0,W,Math.floor(H*.2),'#000000');ctx.globalAlpha=1;
  }
  if(st===7){ // 機械神殿の核: エネルギーライン・コアグロー
    // 水平エネルギーライン
    for(let k=0;k<7;k++){
      const ey=Math.floor(H*(.08+k*.13));
      const ep=Math.floor((t/55+k*41)%W);
      ctx.globalAlpha=0.05+Math.sin(t/280+k)*.025;dr(0,ey,W,1,'#00bbcc');ctx.globalAlpha=1;
      ctx.globalAlpha=0.12;dr(ep,ey-1,Math.floor(W*.15),3,'#00ffcc');ctx.globalAlpha=1;
    }
    // 回路パターン (縦線)
    for(let k=0;k<8;k++){
      const cxp=Math.floor(((k*150+cam.x*.05)%(W+40)+W+40)%(W+40))-20;
      ctx.globalAlpha=0.05;dr(cxp,0,1,H,'#004466');ctx.globalAlpha=1;
      const ndy=Math.floor((t/30+k*27)%H);
      ctx.globalAlpha=0.15;dr(cxp-1,ndy,3,Math.min(14,H-ndy),'#00aaff');ctx.globalAlpha=1;
    }
    // コアグロー (中央パルス)
    const cg=Math.sin(t/380)*.4+.6;
    ctx.globalAlpha=cg*.09;dr(Math.floor(W*.25),Math.floor(H*.25),Math.floor(W*.5),Math.floor(H*.5),'#0055aa');ctx.globalAlpha=1;
    ctx.globalAlpha=cg*.05;dr(Math.floor(W*.1),Math.floor(H*.1),Math.floor(W*.8),Math.floor(H*.8),'#003388');ctx.globalAlpha=1;
    // 浮遊エネルギー粒子
    for(let k=0;k<9;k++){
      const ex2=((k*197+t*.012)%W);
      const ey2=H*.08+((k*89+t*.007)%(H*.78));
      const gl=Math.sin(t/380+k)*.5+.5;
      ctx.globalAlpha=gl*.1;dr(ex2,ey2,3,3,'#00ccff');ctx.globalAlpha=1;
    }
    // 全体に青みの暗さ
    ctx.globalAlpha=0.07;dr(0,0,W,H,'#000a18');ctx.globalAlpha=1;
  }

  // ================================================================
  //  時間帯フィルター（ステージ進行に伴う段階的暗化）
  // ================================================================
  if(st<=5){
    const timeAlphas=[0, 0.05, 0.1, 0.15, 0.2]; // Stage1→5へ向かうにつれ暗くなる
    const filterAlpha=timeAlphas[st-1]||0;
    ctx.globalAlpha=filterAlpha;dr(0,0,W,H,'#000000');ctx.globalAlpha=1;
  }
}

// ================================================================
//  地形描画 (古代遺跡石畳)
// ================================================================
function drawTerrain(){
  const scfg=STAGE_CFG[currentStage-1];
  const tM=scfg.tMain,tH=scfg.tHL,tH2=scfg.tHL2,tS=scfg.tSide,tA=scfg.tAcc;
  const t=frameTime;
  TERRAIN.forEach(ter=>{
    const tx=ter.x-cam.x;if(tx>W+60||tx+ter.w<-60)return;
    // 天井 (ceil)
    if(ter.type==='ceil'){
      dr(tx,ter.y,ter.w,ter.h,tM);
      for(let bx=tx;bx<tx+ter.w;bx+=32)dr(bx,ter.y,1,ter.h,'#0a0a12');
      dr(tx,ter.y+ter.h-3,ter.w,3,tH);dr(tx,ter.y+ter.h-1,ter.w,1,tH2);
      dr(tx,ter.y,2,ter.h,tS);dr(tx+ter.w-2,ter.y,2,ter.h,'#0a0a12');
      // 機械遺跡装飾: ステージ別
      if(currentStage===2){ // 雷峰: 稲妻装飾
        for(let gx=tx+20;gx<tx+ter.w-20;gx+=60){
          dr(gx,ter.y+ter.h-8,2,5,'#2a3860');dr(gx+3,ter.y+ter.h-10,2,5,'#2a3860');}
      }
      if(currentStage===3){ // 炎窟: 溶岩滴り装飾
        for(let gx=tx+16;gx<tx+ter.w-16;gx+=48){
          dr(gx,ter.y+ter.h-1,3,4,'#882200');dr(gx+1,ter.y+ter.h+2,1,3,'#ff4400');}
      }
      if(currentStage===4){ // 深海神殿: 珊瑚装飾
        for(let gx=tx+12;gx<tx+ter.w-12;gx+=44){
          dr(gx,ter.y+ter.h-1,2,5,'#0a3a20');dr(gx+1,ter.y+ter.h,1,4,'#1a6a30');}
      }
      return;
    }
    // 消え足場 (blink)
    if(ter.type==='blink'){
      const phase=((frameTime+(ter.phase||0))%1200);
      const alpha=phase<700?1:phase<800?(800-phase)/100:phase>1100?(phase-1100)/100:0;
      if(alpha<=0)return;
      ctx.globalAlpha=alpha;
      dr(tx,ter.y,ter.w,ter.h,'#0a1428');
      for(let bx2=tx;bx2<tx+ter.w;bx2+=24)dr(bx2,ter.y,1,ter.h,'#04080f');
      dr(tx,ter.y,ter.w,2,'#2255aa');dr(tx,ter.y,ter.w,1,'#44aaff');
      // 点滅エッジ光
      ctx.globalAlpha=alpha*(0.5+Math.sin(t/120)*.3);
      dr(tx,ter.y,ter.w,1,'#88ddff');
      dr(tx,ter.y+ter.h-1,ter.w,1,'#224488');
      ctx.globalAlpha=1;
      return;
    }
    // 崩れ足場 (trap)
    if(ter.type==='trap'){
      if(ter.trapState==='gone')return;
      const shk=ter.trapState==='shaking'?(Math.random()*4-2|0):0;
      const ty=ter.y+shk;
      dr(tx,ty,ter.w,ter.h,'#241808');
      for(let bx=tx;bx<tx+ter.w;bx+=24)dr(bx,ty,1,ter.h,'#0a0500');
      dr(tx,ty,ter.w,2,ter.trapState==='shaking'?'#cc4400':'#7a6030');
      dr(tx,ty,ter.w,1,ter.trapState==='shaking'?'#ff6622':'#aa8840');
      // ひび割れ
      const c1=tx+ter.w*.28|0,c2=tx+ter.w*.62|0;
      dr(c1,ty+1,1,9,'#110800');dr(c1+3,ty+4,1,5,'#110800');
      dr(c2,ty+2,1,8,'#110800');dr(c2-2,ty,1,6,'#110800');
      if(ter.trapState==='shaking'){
        ctx.globalAlpha=0.12+Math.sin(t/60)*.08;
        dr(tx,ty,ter.w,ter.h,'#ff3300');
        ctx.globalAlpha=1;
      }
      return;
    }
    // 踏むと消える床 (disappear)
    if(ter.type==='disappear'){
      const progress=ter.disappearing?1-(ter.disappearTimer/120):0;
      ctx.globalAlpha=1-progress*0.3;
      dr(tx,ter.y,ter.w,ter.h,'#cc4433');
      for(let bx=tx;bx<tx+ter.w;bx+=32)dr(bx,ter.y,1,ter.h,'#771100');
      dr(tx,ter.y,ter.w,2,'#ff6644');dr(tx,ter.y,ter.w,1,'#ffaa88');
      if(ter.disappearing){
        ctx.globalAlpha=progress*.6;
        dr(tx,ter.y,ter.w,ter.h,'#ff3333');
        ctx.globalAlpha=1;
      }
      return;
    }
    // 移動する床 (moving)
    if(ter.type==='moving'){
      dr(tx,ter.y,ter.w,ter.h,'#2244aa');
      for(let bx=tx;bx<tx+ter.w;bx+=32)dr(bx,ter.y,1,ter.h,'#0a1444');
      dr(tx,ter.y,ter.w,2,'#4466ff');dr(tx,ter.y,ter.w,1,'#88aaff');
      // 移動矢印エフェクト
      const arrow=Math.floor((frameTime+ter.x)%(ter.moveSpeed*20))/10;
      ctx.globalAlpha=0.4;
      for(let ax=tx+arrow;ax<tx+ter.w;ax+=ter.moveSpeed*20){
        dr(ax,ter.y+ter.h/2-2,4,4,'#ffff44');
      }
      ctx.globalAlpha=1;
      return;
    }
    const isG=ter.h>20;
    dr(tx,ter.y,ter.w,ter.h,isG?tM:'#12121e');
    // タイル割り石目
    const tile=isG?32:24;
    for(let bx=tx;bx<tx+ter.w;bx+=tile)dr(bx,ter.y,1,ter.h,'#0a0a12');
    // 上端ハイライト
    dr(tx,ter.y,ter.w,2,tH);dr(tx,ter.y,ter.w,1,tH2);
    // 側面影
    dr(tx,ter.y,2,ter.h,tS);dr(tx+ter.w-2,ter.y,2,ter.h,'#0a0a12');
    // ステージ別装飾
    if(currentStage===1&&isG){ // 遺跡: 苔・紋様
      for(let gx=tx+8;gx<tx+ter.w-8;gx+=48)dr(gx,ter.y+2,6,2,'#1a2a1a');
      if(ter.w>150){const gl=Math.floor(ter.x/500)%4,gx=tx+ter.w*.5,gy=ter.y+6;
        if(gl===0){dr(gx-3,gy,6,2,tA);dr(gx-1,gy-2,2,6,tA);}
        if(gl===1){dr(gx-3,gy,6,2,tA);dr(gx-3,gy+4,6,2,tA);}
        if(gl===2)dr(gx-4,gy,8,4,tA);
        if(gl===3)for(let k=0;k<3;k++)dr(gx-4+k*3,gy,2,6,tA);}
    }
    if(currentStage===2&&isG){ // 雷峰: 稲妻紋様
      for(let gx=tx+16;gx<tx+ter.w-16;gx+=56){
        dr(gx,ter.y+2,2,4,'#2a3860');dr(gx+3,ter.y+4,2,4,'#2a3860');}
    }
    if(currentStage===3){ // 炎窟: 溶岩の縁が光る
      const gl=Math.sin(t/300+ter.x*.002)*.4+.6;
      ctx.globalAlpha=gl*.18;dr(tx,ter.y,ter.w,2,'#ff4400');ctx.globalAlpha=1;
    }
    if(currentStage===4&&isG){ // 深海神殿: 海藻・緑光
      for(let gx=tx+10;gx<tx+ter.w-10;gx+=36){
        const wv=Math.sin(t/600+gx*.1)*2;
        dr(gx+wv,ter.y-8,3,10,'#0a3a20');dr(gx+wv+1,ter.y-7,1,8,'#1a6a30');}
    }
    if(currentStage===5){ // 月宮殿: 水晶・白縁
      ctx.globalAlpha=0.22;dr(tx,ter.y,ter.w,1,'#9988ff');ctx.globalAlpha=1;
      if(isG&&ter.w>80){const gx=tx+ter.w*.5-2;dr(gx,ter.y-4,4,6,'#6655aa');dr(gx+1,ter.y-3,2,4,'#cc99ff');}
    }
    if(currentStage===6&&isG){ // 大地の果て: ひび割れ
      for(let gx=tx+20;gx<tx+ter.w-20;gx+=60){
        dr(gx,ter.y+1,1,ter.h-1,'#1a0800');dr(gx+1,ter.y+2,1,ter.h-3,'#0e0600');}
    }
    if(currentStage===7){ // 虚無: エネルギー線が流れる
      const fl=Math.sin(t/200+ter.x*.003)*.5+.5;
      ctx.globalAlpha=fl*.15;dr(tx,ter.y,ter.w,1,'#4400ff');ctx.globalAlpha=1;
    }
  });
}

function drawBossOrb(){

  if(ox<-50||ox>W+50)return;

  ctx.globalAlpha=0.18+gl*.16;

  ctx.globalAlpha=1;

function drawEffect(ef){
  const ex=Math.floor(ef.x-cam.x);
  if(ef.type==='melee'){
    ctx.globalAlpha=ef.timer/15*.65;
    for(let dy=0;dy<ef.h;dy+=P*2)for(let dx=0;dx<ef.w;dx+=P*2){dr(ex+dx,ef.y+dy,P,P,ef.col);}
    ctx.globalAlpha=1;
  }
  if(ef.type==='claw'){
    ctx.globalAlpha=ef.timer/14*.8;
    for(let i=0;i<3;i++){for(let d=0;d<10;d++)dr(ex+i*10+d*P,ef.y+i*12+d*P,P,P,ef.col);}
    ctx.globalAlpha=1;
  }
  if(ef.type==='sword'){
    ctx.globalAlpha=ef.timer/12*.9;
    for(let i=0;i<5;i++){
      dr(ex+i*8,ef.y+i*8,ef.w-i*11,3,'#c0d0ff');
      dr(ex+i*6,ef.y+i*6,ef.w-i*8, 1,'#eef4ff');
    }
    dr(ex,ef.y,7,ef.h,'#ffffff');
    ctx.globalAlpha=1;
  }
  if(ef.type==='poison'){
    ctx.globalAlpha=ef.timer/80*.5;
    for(let dy=0;dy<ef.h;dy+=P*2)for(let dx=0;dx<ef.w;dx+=P*2){
      if((dx+dy)%12<6)dr(ex+dx,ef.y+dy,P*2,P*2,'#44ee44');
    }
    ctx.globalAlpha=1;
  }
  if(ef.type==='slash'){
    const prog=ef.timer/ef.maxTimer;
    ctx.globalAlpha=prog*.28;
    ctx.fillStyle=ef.col;ctx.fillRect(ex,ef.y,ef.w,ef.h);
    ctx.globalAlpha=prog*.9;
    ctx.strokeStyle=ef.col;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(ex+3,ef.y);ctx.lineTo(ex+ef.w,ef.y+ef.h*.75);ctx.stroke();
    ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(ex+3,ef.y);ctx.lineTo(ex+ef.w,ef.y+ef.h*.75);ctx.stroke();
    ctx.strokeStyle=ef.col;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ex,ef.y+ef.h*.25);ctx.lineTo(ex+ef.w-3,ef.y+ef.h);ctx.stroke();
    ctx.globalAlpha=1;
  }
  if(ef.type==='explode'){
    const prog=1-ef.timer/ef.maxTimer;
    const r=Math.max(1,ef.r*prog);
    ctx.globalAlpha=(1-prog)*.9;
    ctx.strokeStyle='#ff8800';ctx.lineWidth=Math.max(1,7*(1-prog));
    ctx.beginPath();ctx.arc(ex,ef.y,r,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#ffee44';ctx.lineWidth=Math.max(1,3*(1-prog));
    ctx.beginPath();ctx.arc(ex,ef.y,r*.55,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
}

function drawCircleBtn(b,held,bg,hbg,br,hbr,tc,lb){
  const cx=b.x+b.s/2, cy=b.y+b.s/2;
  const r=(b.s/2)*(held?0.88:1); // 押下時に少し縮む
  ctx.save();
  // 外側グロー (押下時)
  if(held){
    ctx.globalAlpha=0.4;
    ctx.beginPath();ctx.arc(cx,cy,r+7,0,Math.PI*2);
    ctx.fillStyle=hbr;ctx.fill();
    ctx.globalAlpha=0.18;
    ctx.beginPath();ctx.arc(cx,cy,r+14,0,Math.PI*2);
    ctx.fillStyle=hbr;ctx.fill();
  }
  // 本体
  ctx.globalAlpha=held?0.97:0.70;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=held?hbg:bg;ctx.fill();
  // 上半分ハイライト (立体感)
  const grd=ctx.createLinearGradient(cx,cy-r,cx,cy+r);
  grd.addColorStop(0,`rgba(255,255,255,${held?0.28:0.18})`);
  grd.addColorStop(0.45,'rgba(255,255,255,0)');
  grd.addColorStop(1,`rgba(0,0,0,${held?0.28:0.18})`);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=grd;ctx.fill();
  // リング
  ctx.globalAlpha=held?0.95:0.75;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle=held?hbr:br;ctx.lineWidth=held?2.5:2;ctx.stroke();
  // ラベル
  ctx.globalAlpha=1;
  ctx.fillStyle=held?'#ffffff':tc;
  ctx.font=`bold ${Math.floor(Math.min(r*.66,15))}px monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(lb,cx,cy+1);
  ctx.textBaseline='alphabetic';
  ctx.restore();
}
function drawBtns(){
  const z=getBtns();
  const jetOn=player&&player.jetActive&&Math.floor(frameTime/60)%2;
  const jetBg='#081a12',jetHbg='#116644',jetBr='#224433',jetHbr='#33ffaa',jetTc='#33bb88';
  const btns=[
    {b:z.left,  lb:'◀',   held:touchHeld.left||keys['ArrowLeft']||keys['a'],
     bg:'#0f1828',hbg:'#2244aa',br:'#334466',hbr:'#55aaff',tc:'#8899cc'},
    {b:z.right, lb:'▶',   held:touchHeld.right||keys['ArrowRight']||keys['d'],
     bg:'#0f1828',hbg:'#2244aa',br:'#334466',hbr:'#55aaff',tc:'#8899cc'},
    {b:z.jump,  lb:'飛',held:touchHeld.jumpHeld,
     bg:'#0a1a44',hbg:'#1144dd',br:'#2255aa',hbr:'#66aaff',tc:'#6699ee'},
    {b:z.atk,   lb:'攻', held:false,
     bg:'#2a0a08',hbg:'#bb2200',br:'#662200',hbr:'#ff6644',tc:'#cc4422'},
    {b:z.jet,   lb:'避', held:!!jetOn,
     bg:jetBg,hbg:jetHbg,br:jetBr,hbr:jetHbr,tc:jetTc},
  ];
  btns.forEach(({b,lb,held,bg,hbg,br,hbr,tc})=>{
    drawCircleBtn(b,held,bg,hbg,br,hbr,tc,lb);
  });
  // ATKクールダウン: 円弧で残量表示
  if(player&&player.atkCd>0){
    const cd=CHARS[player.ci].atkCd,b=z.atk;
    const cx=b.x+b.s/2,cy=b.y+b.s/2,r=b.s/2;
    const ratio=player.atkCd/cd;
    ctx.globalAlpha=0.55;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+ratio*Math.PI*2);
    ctx.closePath();ctx.fillStyle='#000';ctx.fill();
    ctx.globalAlpha=1;
  }
  // JETクールダウン: 円弧 + 残秒数
  if(player&&player.jetCd>0&&!player.jetActive){
    const b=z.jet;
    const cx=b.x+b.s/2,cy=b.y+b.s/2,r=b.s/2;
    const ratio=player.jetCd/180;
    ctx.globalAlpha=0.65;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+ratio*Math.PI*2);
    ctx.closePath();ctx.fillStyle='#000';ctx.fill();
    ctx.globalAlpha=1;
    // 残り秒数テキスト
    const secs=Math.ceil(player.jetCd/60);
    ctx.save();ctx.globalAlpha=0.92;
    ctx.fillStyle='#ffffff';ctx.font=`bold ${Math.floor(r*.52)}px monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(secs,cx,cy+1);
    ctx.restore();
  }
  // コンボドット (ATKボタン上・丸ドット)
  if(player){
    const b=z.atk;
    const cx=b.x+b.s/2,cy=b.y-10;
    ctx.globalAlpha=player.comboTimer>0?.9:.28;
    for(let k=0;k<3;k++){
      const lit=player.comboTimer>0&&k<=player.comboStep;
      ctx.beginPath();ctx.arc(cx+(k-1)*13,cy,5,0,Math.PI*2);

function advanceCutscene(){
  if(cutsceneTimer>30||cutsceneFlash>0)return; // 演出中は受け付けない
  cutsceneStep++;
  if(cutsceneStep>=CUTSCENE_LINES.length){
    // 変身エフェクト → ボス戦へ (1回だけ)
    cutsceneFlash=40;
    setTimeout(()=>{
      if(state==='cutscene'){spawnBoss();bgmPlay('boss');addShake(8);state='play';}
    },700);
  } else {
    cutsceneTimer=60;
  }
}

  const step=Math.min(cutsceneStep,CUTSCENE_LINES.length-1);

  dr(cx+2,cy+2,4,10,'#e8e8e8');dr(cx+26,cy+2,4,10,'#e8e8e8');

  // 口 (薄い線)

  bgGrd.addColorStop(0,'#ffaa55');bgGrd.addColorStop(0.4,'#ff8844');bgGrd.addColorStop(1,'#4a2a1a');
  ctx.fillStyle=bgGrd;ctx.fillRect(0,0,W,H);
  // 太陽（大きく）
  const sunX=W*.2, sunY=H*.15;
  ctx.globalAlpha=0.2;ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.arc(sunX,sunY,80,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.4;ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(sunX,sunY,60,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.8;ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(sunX,sunY,40,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // 岩山シルエット（左右）
  ctx.globalAlpha=0.3;ctx.fillStyle='#1a0a00';
  ctx.beginPath();ctx.moveTo(W*.05,H*.5);ctx.lineTo(W*.2,H*.08);ctx.lineTo(W*.35,H*.5);ctx.fill();
  ctx.beginPath();ctx.moveTo(W*.65,H*.5);ctx.lineTo(W*.85,H*.08);ctx.lineTo(W,H*.5);ctx.fill();
  // ── 川：左上から流れてくる桃 ──
  const riverY=H*.25;
  // 川の背景
  ctx.globalAlpha=0.35;ctx.fillStyle='#5a8aaa';ctx.fillRect(0,riverY-20,W*.35,40);
  ctx.globalAlpha=0.2;ctx.fillStyle='#ffffff';
  for(let i=0;i<4;i++){
    const wx=W*(0.02+i*0.08)+(t*.04)%W;
    ctx.fillRect(wx,riverY-8,20,3);ctx.fillRect(wx,riverY+5,20,3);
  }
  // 流れてくる桃（複数）
  const peachSpawnInterval=3000;
  for(let pi=0;pi<4;pi++){
    const peachPhase=((t+pi*peachSpawnInterval)%12000)/12000;
    const px=W*0.15+peachPhase*W*0.3;
    const py=riverY+Math.sin(peachPhase*Math.PI)*15;
    // 桃の身（ピンク）
    ctx.globalAlpha=0.8;ctx.fillStyle='#ff9977';
    ctx.beginPath();ctx.arc(px,py,12,0,Math.PI*2);ctx.fill();
    // 桃の濃い部分（下半分）
    ctx.fillStyle='#ff6655';
    ctx.beginPath();ctx.arc(px,py,12,0,Math.PI);ctx.fill();
    // 桃の葉
    ctx.globalAlpha=0.9;ctx.fillStyle='#55aa55';
    ctx.beginPath();ctx.ellipse(px-3,py-12,4,6,0.4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(px+3,py-12,4,6,-0.4,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // 海の水平線
  ctx.globalAlpha=0.5;ctx.fillStyle='#4a7aaa';ctx.fillRect(0,H*.5,W,H*.1);
  // 砂浜グラデーション
  const sandGrd=ctx.createLinearGradient(0,H*.5,0,H);
  sandGrd.addColorStop(0,'#c89060');sandGrd.addColorStop(1,'#d8a880');
  ctx.fillStyle=sandGrd;ctx.fillRect(0,H*.5,W,H*.5);
  ctx.globalAlpha=1;
  ctx.textAlign='center';
  ctx.fillStyle='#330000';ctx.font=`bold ${Math.min(W*.068,54)}px monospace`;ctx.fillText('鬼ヶ島',W/2+2,H*.3+2);
  ctx.fillStyle='#ff6644';ctx.fillText('鬼ヶ島',W/2,H*.3);
  ctx.fillStyle='#441100';ctx.font=`bold ${Math.min(W*.028,22)}px monospace`;ctx.fillText('- DEMON ISLAND -',W/2+1,H*.3+44);
  ctx.fillStyle='#cc5533';ctx.fillText('- DEMON ISLAND -',W/2,H*.3+42);
  const sv=getSave();
  if(sv){
    const tb=getTitleSaveBtns();
    dr(tb.cont.x,tb.cont.y,tb.cont.w,tb.cont.h,'#111830');
    dr(tb.cont.x,tb.cont.y,tb.cont.w,3,'#4488ff');
    ctx.fillStyle='#88ccff';ctx.font=`bold ${Math.min(W*.038,22)}px monospace`;ctx.textAlign='center';
    ctx.fillText('つづきから',W/2,tb.cont.y+28);
    ctx.fillStyle='#445566';ctx.font=`${Math.min(W*.030,15)}px monospace`;
    ctx.fillText(`ST.${sv.stage}  SCORE: ${sv.score}`,W/2,tb.cont.y+42);
    dr(tb.newg.x,tb.newg.y,tb.newg.w,tb.newg.h,'#0a0a16');
    dr(tb.newg.x,tb.newg.y,tb.newg.w,2,'#333');
    ctx.fillStyle='#556677';ctx.font=`bold ${Math.min(W*.033,18)}px monospace`;ctx.textAlign='center';
    ctx.fillText('はじめから',W/2,tb.newg.y+28);
    ctx.fillStyle='#334';ctx.font=`${Math.min(W*.025,13)}px monospace`;
    ctx.fillText('(セーブデータが消えます)',W/2,tb.newg.y+42);
  }else{
    if(Math.floor(frameTime/500)%2){ctx.fillStyle='#ffee44';ctx.font=`bold ${Math.min(W*.033,20)}px monospace`;ctx.fillText('>> スタート <<',W/2,H*.8);}
  }
}

function csLayout(){
  const bw=100,bh=80,gap=6;
  const r1y=Math.floor(H*0.15);
  const totalW=3*(bw+gap)-gap, sx=(W-totalW)/2;
  const chars=[];
  chars[0]={x:sx,y:r1y,w:bw,h:bh};
  chars[3]={x:sx+(bw+gap),y:r1y,w:bw,h:bh};
  chars[4]={x:sx+2*(bw+gap),y:r1y,w:bw,h:bh};
  return{
    chars,
    start:{x:W/2-78,y:H*.78,w:156,h:42},
    secret:null
  };
}
function drawCharSelect(){
  const t=frameTime;
  // selCharが[0,3,4]に含まれない場合は0に修正
  if(![0,3,4].includes(selChar))selChar=0;
  // 背景: 鬼ヶ島テーマ（黒と深紅のグラデーション）
  const bgGrad=ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#0a0a0f');
  bgGrad.addColorStop(0.5,'#1a1015');
  bgGrad.addColorStop(1,'#0a0a0f');
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

  // 背景パターン: 和風麻の葉文様（半透明）
  ctx.globalAlpha=0.03;
  ctx.fillStyle='#ff3333';
  for(let y=0;y<H;y+=40){
    for(let x=0;x<W;x+=40){
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+20,y+20);ctx.lineTo(x,y+40);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+40,y);ctx.lineTo(x+20,y+20);ctx.lineTo(x+40,y+40);ctx.stroke();
    }
  }
  ctx.globalAlpha=1;

  // 背景: 放射状グロー (選択キャラ色)
  const selCol=CHARS[selChar].col;
  ctx.save();
  ctx.globalAlpha=0.12+Math.sin(t/600)*.05;
  const rg=ctx.createRadialGradient(W/2,H*.52,10,W/2,H*.52,W*.7);
  rg.addColorStop(0,selCol);rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;ctx.restore();

  // タイトル
  ctx.textAlign='center';
  ctx.fillStyle='#223355';ctx.font=`bold ${Math.min(W*.04,16)}px monospace`;
  ctx.fillText('キャラクターを選択',W/2+1,H*.07+1);
  ctx.fillStyle='#aabbff';ctx.font=`bold ${Math.min(W*.04,16)}px monospace`;
  ctx.fillText('キャラクターを選択',W/2,H*.07);

  // ── キャラカード (3体: index 0, 3, 4) ──
  const z=csLayout();
  [0,3,4].forEach(i=>{
    const b=z.chars[i];
    if(!b)return;
    const sel=i===selChar;
    const c=CHARS[i];
    const glow=sel?(Math.sin(t/180)*.12+.88):0;
    // カード背景
    dr(b.x,b.y,b.w,b.h,sel?'#0d1628':'#06060f');
    if(sel){ctx.globalAlpha=glow*.7;dr(b.x-2,b.y-2,b.w+4,b.h+4,c.col);ctx.globalAlpha=1;}
    dr(b.x,b.y,b.w,b.h,sel?'#0d1628':'#06060f');
    dr(b.x,b.y,b.w,2,sel?c.col:'#222');
    dr(b.x,b.y+b.h-2,b.w,2,sel?'#111':'#0a0a0a');
    // キャラスプライト
    ctx.save();ctx.translate(b.x+b.w/2-13,b.y+4);ctx.scale(0.88,0.88);
    drawCharacter(0,0,i,1,0,false,0);ctx.restore();
    ctx.fillStyle=sel?'#ffffff':'#778';ctx.font=`bold ${Math.min(W*.026,11)}px monospace`;ctx.textAlign='center';
    ctx.fillText(c.nick,b.x+b.w/2,b.y+b.h-8);
  });

  // ── 選択キャラ 詳細パネル ──
  const c=CHARS[selChar];
  const AC=SC_ACCNT[selChar];
  const panY=H*.47, panH=H*.44;
  dr(W*.03,panY,W*.94,panH,'#06080f');
  dr(W*.03,panY,W*.94,2,AC);dr(W*.03,panY+panH-2,W*.94,2,'#111');
  // コーナー装飾
  dr(W*.03,panY,6,6,AC);dr(W*.97-6,panY,6,6,AC);

  // 左: 大きいキャラプレビュー
  ctx.save();ctx.translate(W*.03+24,panY+8);ctx.scale(1.32,1.32);
  drawCharacter(0,0,selChar,1,Math.floor(t/200)%4>2?1:0,Math.floor(t/300)%2===0,0);
  ctx.restore();

  // 右: 名前・ステータス
  const rx=W*.03+90,ry=panY+14,rw=W*.94-95;
  ctx.textAlign='left';
  // ── 通常表示 ──
  ctx.fillStyle='#ffffff';ctx.font=`bold ${Math.min(W*.036,14)}px monospace`;
  ctx.fillText(c.nick,rx,ry+14);
  const stats=[
    ['HP',   (c.maxHp-4)/6,  '#44ff88'],
    ['SPD',  (c.spd-3)/4,    '#44ccff'],
    ['ATK',  1-(c.atkCd-12)/22,'#ffaa44'],
    ['JMP',  (-c.jmp-8.5)/2, '#ff88ff'],
  ];
  const grade=r=>r>=.85?'S':r>=.65?'A':r>=.40?'B':'C';
  stats.forEach(([lbl,ratio,col],si)=>{
    const sy=ry+28+si*16, bw2=Math.floor(rw*.42), r=Math.min(1,Math.max(0,ratio));
    ctx.fillStyle='#1a1a2a';ctx.fillRect(rx,sy,bw2,10);
    ctx.fillStyle=col;ctx.fillRect(rx,sy,Math.floor(bw2*r),10);
    ctx.fillStyle='#aabbcc';ctx.font=`${Math.min(W*.036,15)}px monospace`;ctx.textAlign='left';
    ctx.fillText(lbl,rx-30,sy+9);
    ctx.fillStyle=col;ctx.font=`bold ${Math.min(W*.036,14)}px monospace`;
    ctx.fillText(grade(r),rx+bw2+8,sy+9);
  });
  // ABILITY テキスト
  ctx.fillStyle='#88bbdd';ctx.font=`bold ${Math.min(W*.026,10)}px monospace`;ctx.textAlign='left';
  ctx.fillText('ABILITY:',rx,panY+panH-20);
  ctx.fillStyle='#aaccee';ctx.font=`${Math.min(W*.024,10)}px monospace`;
  const abl=c.ability||'';
  const mid=Math.ceil(abl.length/2);
  ctx.fillText(abl.slice(0,mid),rx,panY+panH-8);
  ctx.fillText(abl.slice(mid),rx,panY+panH+4);

  // STARTボタン
  const s=z.start;
  const sg=Math.sin(t/250)*.15+.85;
  ctx.globalAlpha=sg;
  dr(s.x,s.y,s.w,s.h,'#0a1a44');
  dr(s.x,s.y,s.w,2,AC);dr(s.x,s.y,2,s.h,AC);
  dr(s.x+s.w-2,s.y,2,s.h,'#0a0a22');dr(s.x,s.y+s.h-2,s.w,2,'#0a0a22');
  ctx.fillStyle='#ffffff';ctx.font=`bold ${Math.min(W*.028,18)}px monospace`;ctx.textAlign='center';
  ctx.fillText('▶  START MISSION',W/2,s.y+s.h*.65);
  ctx.globalAlpha=1;

}

function drawArenaWalls(){
  if(!bossTriggered||bossDefeated)return;
  const t=frameTime;
  const gl=Math.sin(t/220)*.5+.5;
  const drawWall=(wx)=>{
    const sx=Math.floor(wx-cam.x);
    if(sx>W+30||sx+22<-30)return;
    // 石積み
    dr(sx,0,22,H,'#180d22');
    for(let wy=0;wy<H;wy+=36){
      dr(sx+1,wy+1,20,33,'#221035');
      dr(sx+1,wy+1,20,2,'#301848');
      dr(sx+2,wy+28,18,2,'#110820');
    }
    // エネルギーライン (右端 or 左端)
    ctx.globalAlpha=0.45+gl*.25;
    dr(sx+18,0,4,H,'#cc44ff');
    ctx.globalAlpha=0.18+gl*.12;
    dr(sx+14,0,8,H,'#ff88ff');
    ctx.globalAlpha=1;
    // ルーン文字
    const rc=`rgba(180,80,255,${0.5+gl*.3})`;
    ctx.fillStyle=rc;ctx.font='bold 9px monospace';ctx.textAlign='center';
    for(let ry=40;ry<H-40;ry+=80){
      ctx.fillText(['⚡','☽','✦','⚔'][Math.floor(ry/80)%4],sx+11,ry);
    }
  };
  drawWall(BOSS_ARENA_LEFT-22);
  drawWall(BOSS_ARENA_RIGHT);
}

function drawHazards(){
  const now=frameTime;
  // 落ちてくる岩
  HAZARD_LASERS.forEach(l=>{
    const sx=Math.floor(l.x-cam.x);
    if(sx<-30||sx>W+30)return;
    const cy=l.ceilY;
    if(l.warn){
      // 警告：岩が赤く点滅
      const pulse=Math.sin(now/80)*.4+.6;
      ctx.globalAlpha=pulse*.5;ctx.fillStyle='#884444';ctx.fillRect(sx-5,cy,20,16);
      ctx.globalAlpha=1;
    }else if(l.active){
      // 落下中：岩が降ってくる
      const rockY=cy+(H-cy)*(Math.sin(gameTimer/120)*.5+.5);
      ctx.globalAlpha=0.9;ctx.fillStyle='#774433';ctx.fillRect(sx-5,rockY,20,16);
      ctx.globalAlpha=0.6;ctx.fillStyle='#aa6655';ctx.fillRect(sx-3,rockY+2,16,12);
      ctx.globalAlpha=1;
    }
  });
  // 床スパイク
  HAZARD_SPIKES.forEach(sp=>{
    if(sp.ext<=0)return;
    const sx=Math.floor(sp.x-cam.x);
    if(sx<-40||sx>W+40)return;
    const sy=Math.floor(sp.y);
    for(let i=-1;i<=1;i++){
      const bx=sx+i*10;
      dr(bx,sy-sp.ext,4,sp.ext,'#882200');
      dr(bx+1,sy-sp.ext,2,2,'#ff6644');
      if(sp.ext>10)dr(bx+1,sy-sp.ext+2,1,sp.ext*.4|0,'#cc4400');
    }
    if(sp.active){ctx.globalAlpha=0.22;dr(sx-9,sy-sp.ext-2,26,sp.ext+4,'#ff4400');ctx.globalAlpha=1;}
  });
}

function drawBottomGround(){
  // TERRAIN と穴を区別した地面描画
  const scfg=STAGE_CFG[currentStage-1];
  const tM=scfg.tMain,tH=scfg.tHL,tH2=scfg.tHL2,tS=scfg.tSide,tA=scfg.tAcc;
  const py=H-1;
  const t=frameTime;
  const tile=32;

  // 地形セグメントごとに描画（カメラに対応）
  const startX=Math.floor(cam.x/60)*60;
  const endX=startX+W+120;

  for(let x=startX;x<endX;x+=60){
    const sx=Math.floor(x-cam.x);
    if(sx>W+60||sx+60<-60)continue;

    // この座標範囲が穴か確認
    const isHole=STAGE_HOLES.some(h=>x<h.x2&&x+60>h.x1);

    if(isHole){
      // 穴：海として描画
      const seaCol=currentStage===1?'#0d3d66':'#1a2a4a'; // Stage1は海色、他は深い色
      dr(sx,py-60,60,60,seaCol);
      // 水の波パターン
      for(let i=0;i<3;i++){
        const waveY=Math.sin(t/200+x*0.01+i*2)*2;
        ctx.globalAlpha=0.3;
        dr(sx+i*20,py-40+waveY,18,2,'#1a5a7a');
        ctx.globalAlpha=1;
      }
    } else {
      // 陸地：TERRAIN と同じ色
      dr(sx,py-60,60,60,tM);
      // タイル石目
      for(let bx=sx;bx<sx+60;bx+=tile)dr(bx,py-60,1,60,'#0a0a12');
      // ハイライト
      dr(sx,py-60,60,2,tH);dr(sx,py-60,60,1,tH2);
    }
  }

  // ステージ別装飾（穴以外）
  if(currentStage===1){
    for(let gx=8;gx<W-8;gx+=48){
      const gxWorld=gx+Math.floor(cam.x);
      const isHole=STAGE_HOLES.some(h=>gxWorld<h.x2&&gxWorld+6>h.x1);
      if(!isHole)dr(gx,py-58,6,2,'#1a2a1a');
    }
  }
  if(currentStage===2){
    for(let gx=16;gx<W-16;gx+=56){
      const gxWorld=gx+Math.floor(cam.x);
      const isHole=STAGE_HOLES.some(h=>gxWorld<h.x2&&gxWorld+5>h.x1);
      if(!isHole){dr(gx,py-58,2,4,'#2a3860');dr(gx+3,py-56,2,4,'#2a3860');}
    }
  }
  if(currentStage===3){
    const gl=Math.sin(t/300)*.4+.6;
    ctx.globalAlpha=gl*.18;dr(0,py-60,W,2,'#ff4400');ctx.globalAlpha=1;
  }
}

function drawZeroGZones(){
  const t=frameTime;
  ZERO_G_ZONES.forEach(z=>{
    const x1=Math.floor(z.x1-cam.x),x2=Math.floor(z.x2-cam.x);
    if(x2<-60||x1>W+60)return;
    const w=x2-x1,h=z.y2-z.y1;
    ctx.globalAlpha=0.06+Math.sin(t/500)*0.025;
    ctx.fillStyle='#8899ff';ctx.fillRect(x1,z.y1,w,h);
    ctx.globalAlpha=0.28+Math.sin(t/320)*0.08;
    ctx.fillStyle='#aabbff';ctx.fillRect(x1,z.y1,w,2);
    ctx.fillStyle='#aabbff';ctx.fillRect(x1,z.y2-2,w,2);
    ctx.globalAlpha=1;
    ctx.globalAlpha=0.4+Math.sin(t/600)*0.12;
    ctx.fillStyle='#88aaff';ctx.font='bold 9px monospace';ctx.textAlign='center';
    const tx=Math.min(Math.max(x1+w/2,50),W-50);
    ctx.fillText('ZERO-G',tx,z.y1+18);
    ctx.globalAlpha=1;
    for(let px=Math.max(x1,0);px<Math.min(x2,W);px+=36){
      const py=z.y1+((px*5+Math.floor(t/90)*4)%h);
      ctx.globalAlpha=0.15;ctx.fillStyle='#ffffff';ctx.fillRect(px,py,2,2);ctx.globalAlpha=1;
    }
  });
}
function drawPlay(){
  drawBg();
  drawZeroGZones();
  drawTerrain();
  drawHazards();
  drawGoal();
  drawArenaWalls();
  drawBottomGround();  // ステージテーマに合わせた地面を描画
  drawStageItems();
  // 壁スライドスパーク
  if(player&&player.onWall&&player.wallSlide&&!player.onGround&&Math.random()<.4)
    burst(player.x-cam.x+(player.wallDir>0?player.w:0),player.y+player.h*.6,'#aabbff',1);
  // Lv2 オーラ
  if(player&&player.weaponLv===2){
    const ax=Math.floor(player.x-cam.x+player.w/2),ay=Math.floor(player.y+player.h/2),tt=frameTime;
    ctx.globalAlpha=0.14+Math.sin(tt/130)*.07;ctx.fillStyle='#ff8800';
    ctx.beginPath();ctx.arc(ax,ay,28,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.1+Math.sin(tt/90)*.06;ctx.fillStyle='#ffdd44';
    ctx.beginPath();ctx.arc(ax,ay,18,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // LVアップグロー
  if(player&&lvupFlash>0){
    const ax=Math.floor(player.x-cam.x+player.w/2),ay=Math.floor(player.y+player.h/2);
    const fa=(lvupFlash/180)*Math.abs(Math.sin(frameTime/55));
    ctx.globalAlpha=fa*0.55;ctx.fillStyle='#ffee00';
    ctx.beginPath();ctx.arc(ax,ay,44,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=fa*0.35;ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(ax,ay,28,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  effects.forEach(drawEffect);
  projectiles.forEach(p=>{
    const bx=Math.floor(p.x-cam.x),by=Math.floor(p.y);
    if(p.wlv>=1){
      const now=frameTime,cr=Math.max(p.w,p.h)/2;
      ctx.globalAlpha=0.16+Math.sin(now/90)*.06;
      ctx.fillStyle=p.wlv===2?'#ff8800':'#ffdd44';
      ctx.beginPath();ctx.arc(bx+p.w/2,by+p.h/2,cr+8,0,Math.PI*2);ctx.fill();
      if(p.wlv===2){
        ctx.globalAlpha=0.22+Math.sin(now/130)*.08;
        ctx.fillStyle='#ff5500';
        ctx.beginPath();ctx.arc(bx+p.w/2,by+p.h/2,cr+16,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
    }
    if(p.claw){
      // 狼: 3本の爪傷が飛ぶ
      const dir=p.vx>=0?1:-1;

    }
    if(player.shieldActive){
      const sx=Math.floor(player.x-cam.x)+player.w/2;
      const sy=Math.floor(player.y)+player.h/2;
      const pulse=Math.sin(frameTime/90)*.28+.72;
      const R=Math.max(player.w,player.h)*.64;
      ctx.save();
      ctx.globalAlpha=.13*pulse;
      const rg=ctx.createRadialGradient(sx,sy,0,sx,sy,R);
      rg.addColorStop(0,'#88ddff');rg.addColorStop(1,'transparent');
      ctx.fillStyle=rg;ctx.beginPath();ctx.arc(sx,sy,R,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=.65*pulse;ctx.strokeStyle='#44bbff';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(sx,sy,R,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=.35*pulse;ctx.strokeStyle='#ccffff';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(sx,sy,R-3,0,Math.PI*2);ctx.stroke();
      const rot=frameTime/700;
      ctx.globalAlpha=.4*pulse;ctx.strokeStyle='#66ddff';ctx.lineWidth=1.5;
      ctx.beginPath();
      for(let k=0;k<6;k++){const a=rot+k*Math.PI/3;k===0?ctx.moveTo(sx+Math.cos(a)*R,sy+Math.sin(a)*R):ctx.lineTo(sx+Math.cos(a)*R,sy+Math.sin(a)*R);}
      ctx.closePath();ctx.stroke();
      ctx.globalAlpha=1;ctx.restore();
    }
    if(player.powerTimer>0){
      const sx=Math.floor(player.x-cam.x)+player.w/2;
      const sy=Math.floor(player.y)+player.h/2;
      const pulse=Math.sin(frameTime/70)*.32+.68;
      const R=Math.max(player.w,player.h)*.72;
      ctx.save();
      ctx.globalAlpha=.15*pulse;
      const rg=ctx.createRadialGradient(sx,sy,0,sx,sy,R);
      rg.addColorStop(0,'#ff8844');rg.addColorStop(1,'transparent');
      ctx.fillStyle=rg;ctx.beginPath();ctx.arc(sx,sy,R,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=.6*pulse;ctx.strokeStyle='#ff6600';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(sx,sy,R,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=.4*pulse;ctx.strokeStyle='#ffaa44';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(sx,sy,R-4,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;ctx.restore();
    }
  }
  // damageNums 描画
  damageNums.forEach(d=>{
    ctx.globalAlpha=d.life/44;
    if(d.weak){
      ctx.fillStyle='#ffee00';ctx.font=`bold ${14+d.val*2}px monospace`;ctx.textAlign='center';
      ctx.fillText('★'+d.val,Math.floor(d.x-cam.x),Math.floor(d.y));
    } else {
      ctx.fillStyle=d.val>=3?'#ffee00':d.val>=2?'#ffaa44':'#ff8888';
      ctx.font=`bold ${11+d.val*2}px monospace`;ctx.textAlign='center';
      ctx.fillText(d.val,Math.floor(d.x-cam.x),Math.floor(d.y));
    }
    ctx.globalAlpha=1;
  });
  // comboTexts 描画
  comboTexts.forEach(c=>{
    ctx.globalAlpha=c.life/45;
    ctx.fillStyle='#ffee00';ctx.strokeStyle='#884400';ctx.lineWidth=3;
    ctx.font=`bold ${Math.min(W*.038,20)}px monospace`;ctx.textAlign='center';
    ctx.strokeText('FINISH!!',Math.floor(c.x-cam.x),Math.floor(c.y));
    ctx.fillText('FINISH!!',Math.floor(c.x-cam.x),Math.floor(c.y));
    ctx.globalAlpha=1;
  });
  // グロー・シャドウ効果レイヤー（全体的な美観向上）
  ctx.globalAlpha=0.04;ctx.fillStyle='#000000';
  ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;

  drawBtns();
  drawHUD();
  // ボス登場バナー
  if(bossBannerTimer>0){
    const cfg=STAGE_CFG[currentStage-1];
    const bt=bossBannerTimer;
    const alpha=bt>140?1:bt<40?bt/40:1;
    ctx.save();
    // 暗幕
    ctx.globalAlpha=alpha*0.72;dr(0,H*.28,W,H*.36,'#000010');
    // 赤ライン上下
    ctx.globalAlpha=alpha;
    dr(0,H*.28,W,2,'#cc0033');dr(0,H*.64,W,2,'#cc0033');
    // 走査線エフェクト
    const sc2=Math.floor(frameTime/18)%4;
    ctx.globalAlpha=alpha*0.10;
    for(let sy=H*.28+sc2;sy<H*.64;sy+=4)dr(0,sy,W,2,'#ffffff');
    ctx.globalAlpha=alpha;
    ctx.textAlign='center';
    // BOSS INCOMING ラベル
    ctx.fillStyle='#cc0033';ctx.font=`bold ${Math.min(W*.034,14)}px monospace`;
    ctx.fillText('─────  BOSS APPROACHING  ─────',W/2,H*.33);
    // ボス名 (大)
    const pulse=Math.sin(frameTime/90)*.06+.94;
    ctx.globalAlpha=alpha*pulse;
    ctx.fillStyle='#ff3355';ctx.font=`bold ${Math.min(W*.14,56)}px monospace`;
    ctx.fillText(cfg.bossName,W/2,H*.48);
    // ステージ名
    ctx.globalAlpha=alpha*0.8;
    ctx.fillStyle='#ff8899';ctx.font=`${Math.min(W*.044,18)}px monospace`;
    ctx.fillText(cfg.name+'  —  '+cfg.sub,W/2,H*.57);
    // フェーズ通知
    ctx.globalAlpha=alpha*0.6;
    ctx.fillStyle='#884455';ctx.font=`${Math.min(W*.034,14)}px monospace`;
    ctx.fillText(`STAGE ${currentStage} / ${TOTAL_STAGES}  BOSS BATTLE`,W/2,H*.63);
    ctx.globalAlpha=1;ctx.restore();
  }
  // ステージブリーフィングオーバーレイ
  if(stageBriefTimer>0){
    const alpha=stageBriefTimer>160?1:stageBriefTimer/160;
    ctx.save();
    ctx.globalAlpha=alpha*0.80;
    ctx.fillStyle='#000020';ctx.fillRect(0,H*.25,W,H*.42);
    ctx.globalAlpha=1;
    const scfg=STAGE_CFG[currentStage-1];
    ctx.globalAlpha=alpha;
    ctx.textAlign='center';
    ctx.fillStyle='#556699';ctx.font=`${Math.min(W*.033,14)}px monospace`;
    ctx.fillText(`STAGE ${currentStage}  ─  MISSION BRIEFING`,W/2,H*.30);
    ctx.fillStyle='#aaccff';ctx.font=`bold ${Math.min(W*.042,18)}px monospace`;
    ctx.fillText(scfg.name,W/2,H*.36);
    const brief=STAGE_BRIEF[currentStage-1]||'';
    ctx.fillStyle='#8899bb';ctx.font=`${Math.min(W*.03,13)}px monospace`;
    brief.split('\n').forEach((line,i)=>ctx.fillText(line,W/2,H*.44+i*20));
    ctx.fillStyle='#334466';ctx.font=`${Math.min(W*.030,13)}px monospace`;
    ctx.fillText('[ TAP TO DISMISS ]',W/2,H*.62);
    ctx.globalAlpha=1;
    ctx.restore();
  }
  // ポーズオーバーレイ
  if(paused){
    ctx.fillStyle='rgba(0,0,24,0.84)';ctx.fillRect(0,0,W,H);
    // タイトル
    ctx.textAlign='center';
    const pt=frameTime;
    ctx.globalAlpha=0.7+Math.sin(pt/400)*.15;
    ctx.fillStyle='#cc44ff';ctx.font=`bold ${Math.min(W*.07,44)}px monospace`;
    ctx.fillText('PAUSE',W/2,H*.24);
    ctx.globalAlpha=1;
    // 区切り線
    ctx.globalAlpha=0.4;dr(W*.12,H*.28,W*.76,1,'#8844cc');ctx.globalAlpha=1;
    const pm=getPauseMenuBtns();
    const drawPBtn=(b,top,tc,label,sub)=>{
      ctx.globalAlpha=0.88;dr(b.x,b.y,b.w,b.h,'#0c0e1e');ctx.globalAlpha=1;
      dr(b.x,b.y,b.w,3,top);
      ctx.strokeStyle=top;ctx.lineWidth=1;ctx.globalAlpha=0.5;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.globalAlpha=1;
      ctx.fillStyle=tc;ctx.font=`bold ${Math.min(W*.042,22)}px monospace`;ctx.textAlign='center';
      ctx.fillText(label,W/2,b.y+b.h*.58);
      if(sub){ctx.fillStyle='#445566';ctx.font=`${Math.min(W*.028,14)}px monospace`;ctx.fillText(sub,W/2,b.y+b.h*.88);}
    };
    drawPBtn(pm.resume,  '#5566ff','#aabbff','▶  ゲーム再開',null);
    drawPBtn(pm.savequit,'#cc8844','#ddaa66','💾  セーブして終了','現在地・HPを保存');
    drawPBtn(pm.title,   '#446688','#7799aa','⏎  タイトルへ戻る','セーブせずに戻る');
    ctx.fillStyle='#334455';ctx.font=`${Math.min(W*.025,13)}px monospace`;
    ctx.fillText('P / ESC でつづける',W/2,H*.92);
  }
}

// ================================================================
//  ゲームオーバー - 高品質グラフィックス版
// ================================================================
function drawGameOver(){
  // 背景グラデーション
  const bgGrd=ctx.createLinearGradient(0,0,0,H);
  bgGrd.addColorStop(0,'#1a0000');bgGrd.addColorStop(0.5,'#000000');bgGrd.addColorStop(1,'#0a0000');
  ctx.fillStyle=bgGrd;ctx.fillRect(0,0,W,H);

  // きびだんごモチーフ背景（グラデーション・立体感）
  const dango=[
    {x:W*.15,y:H*.15,r:40,col:'#FFD700'},
    {x:W*.75,y:H*.2,r:35,col:'#FFE55C'},
    {x:W*.2,y:H*.65,r:45,col:'#FFC107'},
    {x:W*.8,y:H*.7,r:38,col:'#FFD700'},
    {x:W*.5,y:H*.85,r:50,col:'#FFA500'}
  ];
  dango.forEach(d=>{
    // 外光
    ctx.globalAlpha=0.18;
    const dGrd=ctx.createRadialGradient(d.x-d.r/3,d.y-d.r/3,d.r/4,d.x,d.y,d.r);
    dGrd.addColorStop(0,d.col);dGrd.addColorStop(1,'rgba(255,200,0,0)');
    ctx.fillStyle=dGrd;ctx.beginPath();ctx.arc(d.x,d.y,d.r*1.2,0,Math.PI*2);ctx.fill();
    // 本体グラデーション
    ctx.globalAlpha=0.3;
    const dGrad=ctx.createRadialGradient(d.x-d.r*.3,d.y-d.r*.3,d.r*.2,d.x,d.y,d.r);
    dGrad.addColorStop(0,d.col);dGrad.addColorStop(1,'rgba(200,150,0,1)');
    ctx.fillStyle=dGrad;ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill();
    // 光の枠線
    ctx.globalAlpha=0.35;ctx.strokeStyle=d.col;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=0.15;ctx.strokeStyle='#ffffff';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(d.x,d.y,d.r-2,0,Math.PI*2);ctx.stroke();
  });
  ctx.globalAlpha=1;
  // 暗いオーバーレイ
  ctx.globalAlpha=0.65;dr(0,0,W,H,'rgba(30,0,0,1)');ctx.globalAlpha=1;
  ctx.textAlign='center';
  ctx.fillStyle='#330000';ctx.font=`bold ${Math.min(W*.06,44)}px monospace`;ctx.fillText('修行を重ねて',W/2+2,H*.25+2);
  ctx.fillStyle='#ff9944';ctx.fillText('修行を重ねて',W/2,H*.25);
  ctx.fillStyle='#330000';ctx.font=`bold ${Math.min(W*.05,36)}px monospace`;ctx.fillText('再び鬼ヶ島へ',W/2+2,H*.35+2);
  ctx.fillStyle='#ff9944';ctx.fillText('再び鬼ヶ島へ',W/2,H*.35);
  ctx.fillStyle='#ffdd44';ctx.font=`bold ${Math.min(W*.03,22)}px monospace`;
  ctx.fillText('SCORE '+String(score).padStart(6,'0'),W/2,H*.44);
  const scores=getScores();
  if(scores.length){
    ctx.fillStyle='#334455';ctx.font=`bold ${Math.min(W*.030,15)}px monospace`;
    ctx.fillText('── ベストスコア ──',W/2,H*.54);
    scores.slice(0,3).forEach((s,i)=>{
      ctx.fillStyle=i===0?'#ffcc00':'#7788aa';
      ctx.font=`${Math.min(W*.020,13)}px monospace`;
      ctx.fillText(`${i+1}. ${s.char}  ${String(s.score).padStart(7,'0')}`,W/2,H*.59+i*14);
    });
  }
  // ボタン
  const gb=getGameOverBtns();
  ctx.globalAlpha=0.9;dr(gb.retry.x,gb.retry.y,gb.retry.w,gb.retry.h,'#0d1a3a');ctx.globalAlpha=1;
  dr(gb.retry.x,gb.retry.y,gb.retry.w,3,'#4466ff');
  ctx.fillStyle='#88aaff';ctx.font=`bold ${Math.min(W*.042,22)}px monospace`;
  ctx.fillText('▶  リトライ',W/2,gb.retry.y+gb.retry.h*.65);
  ctx.fillStyle='#334466';ctx.font=`${Math.min(W*.028,14)}px monospace`;
  ctx.fillText(`ST.${currentStage}から再開`,W/2,gb.retry.y+gb.retry.h*.92);
  ctx.globalAlpha=0.9;dr(gb.charsel.x,gb.charsel.y,gb.charsel.w,gb.charsel.h,'#0a0a14');ctx.globalAlpha=1;
  dr(gb.charsel.x,gb.charsel.y,gb.charsel.w,2,'#445566');
  ctx.fillStyle='#667788';ctx.font=`bold ${Math.min(W*.038,20)}px monospace`;
  ctx.fillText('キャラ選択へ',W/2,gb.charsel.y+gb.charsel.h*.68);
  ctx.fillStyle='#334455';ctx.font=`${Math.min(W*.025,13)}px monospace`;
  ctx.fillText('ENTER:リトライ  ESC:キャラ選択',W/2,H*.94);
}

// ================================================================
//  メインループ
// ================================================================
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  if(isPortrait){
    // 縦持ちでも横向きゲームを表示: ctx内部で90度回転+スケール
    // 論理(x,y)→物理canvas(y*s, canvas.height-x*s) where s=canvas.width/H
    const s=canvas.width/H;
    ctx.translate(0,canvas.height);
    ctx.rotate(-Math.PI/2);
    ctx.scale(s,s);
  } else {
    const s=canvas.height/H;
    ctx.scale(s,s);
  }
  if(shakeDx||shakeDy)ctx.translate(Math.round(shakeDx),Math.round(shakeDy));
  if(state==='splash')drawSplash();
  else if(state==='title')drawTitle();
  else if(state==='story')drawStory();
  else if(state==='charselect')drawCharSelect();
  else if(state==='play')drawPlay();
  else if(state==='stageclear')drawStageClear();
  else if(state==='gameover')drawGameOver();
  else if(state==='cutscene')drawCutscene();
  else if(state==='ending')drawEnding();
  ctx.restore();
}
function loop(){frameTime=Date.now();try{update();draw();}catch(e){console.error('[LOOP]',e);}requestAnimationFrame(loop);}

loop();
</script>
